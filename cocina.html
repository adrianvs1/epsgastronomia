<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cocina PRO FINAL</title>

<style>
body{
 font-family:system-ui;
 background:#020617;
 color:white;
 margin:0;
 padding:10px;
}

h1{text-align:center}

.card{
 background:#111827;
 padding:10px;
 border-radius:10px;
 margin-bottom:10px;
}

button{
 width:100%;
 padding:10px;
 margin-top:5px;
 border:none;
 border-radius:8px;
 background:#22c55e;
 color:white;
}

.rojo{background:#ef4444}
</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
 getFirestore,
 collection,
 onSnapshot,
 doc,
 updateDoc,
 deleteDoc,
 getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAa_bH-T5Uv36eM-dSjasTFzVWp9Iwj0Ps",
  authDomain: "epsgastronomia-6d1b2.firebaseapp.com",
  projectId: "epsgastronomia-6d1b2",
  storageBucket: "epsgastronomia-6d1b2.firebasestorage.app",
  messagingSenderId: "735621231992",
  appId: "1:735621231992:web:ac62161644b7377095448d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 👀 pedidos
onSnapshot(collection(db,"pedidos"),(snap)=>{

 let cont=document.getElementById("pedidos");
 cont.innerHTML="";

 snap.forEach(d=>{
  const p=d.data();

  let div=document.createElement("div");
  div.className="card";

  div.innerHTML=`
   <h3>🍽️ Mesa ${p.mesa}</h3>
   <p>${p.items.map(i=>i.nombre).join(", ")}</p>
   <p>Total: $${p.total}</p>
  `;

  if(!p.listo){
    let btn=document.createElement("button");
    btn.textContent="✔ LISTO";

    btn.onclick=async()=>{
      await updateDoc(doc(db,"pedidos",d.id),{
        listo:true
      });
    };

    div.appendChild(btn);
  } else {
    div.innerHTML+="<p>✔ LISTO</p>";
  }

  cont.appendChild(div);
 });

});

// 🧹 borrar todo
window.borrarTodo=async()=>{
 if(!confirm("¿Borrar todo?")) return;

 const snap=await getDocs(collection(db,"pedidos"));

 snap.forEach(async(d)=>{
  await deleteDoc(doc(db,"pedidos",d.id));
 });

 alert("Borrado completo");
};

</script>

</head>

<body>

<h1>👨‍🍳 Cocina PRO FINAL</h1>

<button class="rojo" onclick="borrarTodo()">🧹 Borrar todo</button>

<div id="pedidos"></div>

</body>
</html>
