<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cocina PRO FINAL</title>

<style>
body{font-family:system-ui;background:#020617;color:white;padding:10px}
.card{background:#111827;padding:10px;margin:10px 0;border-radius:10px}
button{width:100%;padding:10px;border:none;border-radius:8px;margin-top:5px;cursor:pointer}
.verde{background:#22c55e;color:white}
.rojo{background:#ef4444;color:white}
</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore,
collection,
onSnapshot,
doc,
updateDoc,
deleteDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAa_bH-T5Uv36eM-dSjasTFzVWp9Iwj0Ps",
authDomain: "epsgastronomia-6d1b2.firebaseapp.com",
projectId: "epsgastronomia-6d1b2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 👨‍🍳 mostrar pedidos en cocina
onSnapshot(collection(db,"pedidos"),snap=>{

let cont=document.getElementById("c");
cont.innerHTML="";

snap.forEach(d=>{
let p=d.data();

if(p.estado==="cerrado") return;

let div=document.createElement("div");
div.className="card";

// 🚫 SIN PRECIOS
div.innerHTML=`
<h3>🍽️ Mesa ${p.mesa}</h3>

<ul>
${(p.items||[]).map(i=>`<li>${i.n}</li>`).join("")}
</ul>

<p>🕒 ${p.fecha || ""}</p>
`;

if(p.estado==="cocina"){
let btn=document.createElement("button");
btn.className="verde";
btn.innerText="✔ LISTO";

btn.onclick=async()=>{
await updateDoc(doc(db,"pedidos",d.id),{
estado:"entregado"
});
};

div.appendChild(btn);
}

if(p.estado==="entregado"){
div.innerHTML+="<p>✔ LISTO PARA MOZO</p>";
}

cont.appendChild(div);
});

});

// 🧹 RESET TOTAL (BORRAR TODO)
window.resetTodo=async()=>{

if(!confirm("¿Seguro que querés borrar TODOS los pedidos?")) return;

const snap=await getDocs(collection(db,"pedidos"));

snap.forEach(async(d)=>{
await deleteDoc(doc(db,"pedidos",d.id));
});

alert("Sistema reseteado ✔");
};

</script>

</head>

<body>

<h1>👨‍🍳 COCINA PRO FINAL</h1>

<button class="rojo" onclick="resetTodo()">🧹 RESET SISTEMA</button>

<div id="c"></div>

</body>
</html>
