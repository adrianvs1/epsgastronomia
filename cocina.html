<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cocina</title>

<style>
body{font-family:system-ui;background:#020617;color:white;margin:0;padding:10px}
h1{text-align:center}

.card{
background:#111827;
padding:10px;
margin-bottom:10px;
border-radius:10px;
}

button{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
}

.rojo{background:#ef4444}
</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore,
collection,
onSnapshot,
doc,
updateDoc,
deleteDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "TU_API_KEY",
authDomain: "TU_AUTH",
projectId: "TU_PROJECT_ID",
storageBucket: "TU_BUCKET",
messagingSenderId: "TU_ID",
appId: "TU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

onSnapshot(collection(db,"pedidos"),(snap)=>{

let cont=document.getElementById("pedidos");
cont.innerHTML="";

snap.forEach(d=>{
const p=d.data();

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<h3>Mesa ${p.mesa}</h3>
<p>${p.items.map(i=>i.nombre).join(", ")}</p>
<p>Total $${p.total}</p>
`;

if(!p.listo){
let btn=document.createElement("button");
btn.textContent="LISTO";

btn.onclick=async()=>{
await updateDoc(doc(db,"pedidos",d.id),{
listo:true
});
};

div.appendChild(btn);
} else {
div.innerHTML+="✔ LISTO";
}

cont.appendChild(div);
});

});

// borrar todo
window.borrarTodo=async()=>{
const snap=await getDocs(collection(db,"pedidos"));

snap.forEach(async(d)=>{
await deleteDoc(doc(db,"pedidos",d.id));
});

alert("Borrado");
};

</script>

</head>

<body>

<h1>Cocina</h1>

<button class="rojo" onclick="borrarTodo()">Borrar todo</button>

<div id="pedidos"></div>

</body>
</html>
