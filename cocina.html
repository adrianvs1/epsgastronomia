<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cocina PRO</title>

<style>
body{
 font-family:system-ui;
 background:#020617;
 color:white;
 margin:0;
 padding:10px;
}

h1{
 text-align:center;
 margin-bottom:10px;
}

.grid{
 display:grid;
 grid-template-columns:1fr;
 gap:10px;
}

.card{
 background:#111827;
 padding:12px;
 border-radius:14px;
 box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.card.lista{
 border-left:5px solid #22c55e;
}

.card.pendiente{
 border-left:5px solid #f59e0b;
}

button{
 margin-top:10px;
 padding:10px;
 border:none;
 border-radius:8px;
 background:#22c55e;
 color:white;
 font-size:14px;
}

.total{
 font-weight:bold;
 margin-top:5px;
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAa_bH-T5Uv36eM-dSjasTFzVWp9Iwj0Ps",
  authDomain: "epsgastronomia-6d1b2.firebaseapp.com",
  projectId: "epsgastronomia-6d1b2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// escuchar pedidos en tiempo real
onSnapshot(collection(db,"pedidos"),(snap)=>{
 let cont=document.getElementById("pedidos");
 cont.innerHTML="";

 snap.forEach(d=>{
  let p=d.data();

  let div=document.createElement("div");
  div.className="card " + (p.listo ? "lista" : "pendiente");

  div.innerHTML=`
   <h2>🍽️ Mesa ${p.mesa}</h2>
   <p>${p.items.map(i=>i.nombre).join(", ")}</p>
   <p class="total">Total: $${p.total}</p>
  `;

  if(!p.listo){
   let btn=document.createElement("button");
   btn.textContent="✔ Marcar como Listo";

   btn.onclick=async()=>{
    await updateDoc(doc(db,"pedidos",d.id),{
     listo:true
    });
   };

   div.appendChild(btn);
  }else{
   let listo=document.createElement("p");
   listo.textContent="✅ LISTO";
   div.appendChild(listo);
  }

  cont.appendChild(div);
 });
});
</script>
</head>

<body>

<h1>👨‍🍳 Cocina</h1>

<div class="grid" id="pedidos"></div>

</body>
</html>
