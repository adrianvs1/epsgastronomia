<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cocina EPS</title>

<style>
body{
font-family:system-ui;
background:#020617;
color:white;
padding:10px;
margin:0;
}

/* TITULO GRANDE */
h1{
text-align:center;
font-size:28px;
margin-bottom:10px;
}

/* TARJETAS MÁS GRANDES */
.card{
background:#111827;
padding:18px;
margin:12px 0;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

/* MESA DESTACADA */
h3{
font-size:26px;
margin:0 0 10px 0;
color:#facc15;
}

/* LISTA PRODUCTOS GRANDE */
ul{
padding-left:20px;
font-size:18px;
}

li{
margin-bottom:5px;
}

/* HORA */
p{
font-size:14px;
opacity:0.8;
}

/* BOTONES GRANDES */
button{
width:100%;
padding:16px;
border:none;
border-radius:10px;
margin-top:10px;
cursor:pointer;
font-size:18px;
font-weight:bold;
}

.verde{
background:#22c55e;
color:white;
}

.rojo{
background:#ef4444;
color:white;
}

/* EFECTO TOQUE CELULAR */
button:active{
transform:scale(0.97);
}
</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore,
collection,
onSnapshot,
doc,
updateDoc,
deleteDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAa_bH-T5Uv36eM-dSjasTFzVWp9Iwj0Ps",
authDomain: "epsgastronomia-6d1b2.firebaseapp.com",
projectId: "epsgastronomia-6d1b2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

//////////////////////////////////////////////////////
// 🔥 PEDIDOS EN VIVO
//////////////////////////////////////////////////////

onSnapshot(collection(db,"pedidos"),snap=>{

let cont=document.getElementById("c");
cont.innerHTML="";

snap.forEach(d=>{
let p=d.data();

if(p.estado==="cerrado") return;

let div=document.createElement("div");
div.className="card";

/* CONTENIDO */
div.innerHTML=`
<h3>🍽️ MESA ${p.mesa}</h3>

<ul>
${(p.items||[]).map(i=>`<li>${i.n}</li>`).join("")}
</ul>

<p>🕒 ${p.fecha || ""}</p>
`;

/* BOTÓN LISTO */
if(p.estado==="cocina"){
let btn=document.createElement("button");
btn.className="verde";
btn.innerText="✔ LISTO";

btn.onclick=async()=>{
await updateDoc(doc(db,"pedidos",d.id),{
estado:"entregado"
});
};

div.appendChild(btn);
}

/* ESTADO FINAL */
if(p.estado==="entregado"){
let ok=document.createElement("div");
ok.innerHTML="✔ LISTO PARA MOZO";
ok.style.fontSize="18px";
ok.style.marginTop="10px";
ok.style.color="#22c55e";
div.appendChild(ok);
}

cont.appendChild(div);
});

});

//////////////////////////////////////////////////////
// 🧹 RESET
//////////////////////////////////////////////////////

window.resetTodo=async()=>{

if(!confirm("¿Seguro que querés borrar TODO?")) return;

const snap=await getDocs(collection(db,"pedidos"));

snap.forEach(async(d)=>{
await deleteDoc(doc(db,"pedidos",d.id));
});

alert("Sistema limpio ✔");
};

</script>

</head>

<body>

<h1>👨‍🍳 COCINA EPS</h1>

<button class="rojo" onclick="resetTodo()">🧹 RESET SISTEMA</button>

<div id="c"></div>

</body>
</html>
