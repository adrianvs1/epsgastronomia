<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mozo PRO</title>

<style>
body{
 font-family:system-ui;
 background:#0f172a;
 color:white;
 margin:0;
 padding:10px;
}

h1{text-align:center}

.grid{
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:10px;
 margin-bottom:10px;
}

.mesa{
 padding:20px;
 text-align:center;
 border-radius:12px;
 background:#1e293b;
 font-size:18px;
 cursor:pointer;
}

.mesa.activa{background:#22c55e}

.card{
 background:#1e293b;
 padding:10px;
 border-radius:12px;
 margin-bottom:10px;
}

button{
 width:100%;
 padding:12px;
 margin:5px 0;
 border:none;
 border-radius:10px;
 background:#3b82f6;
 color:white;
 font-size:15px;
}

.reset{background:#ef4444}
.enviar{background:#22c55e}

ul{list-style:none;padding:0}
li{padding:5px 0;border-bottom:1px solid #444}

.total{
 font-size:22px;
 text-align:center;
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, getDoc, setDoc, updateDoc, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAa_bH-T5Uv36eM-dSjasTFzVWp9Iwj0Ps",
  authDomain: "epsgastronomia-6d1b2.firebaseapp.com",
  projectId: "epsgastronomia-6d1b2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let mesaActual=null;
let pedido=[];
let total=0;

// seleccionar mesa
window.selectMesa=(n)=>{
 mesaActual=n;
 document.querySelectorAll(".mesa").forEach(m=>m.classList.remove("activa"));
 document.getElementById("m"+n).classList.add("activa");
}

// agregar producto
window.addItem=(n,p)=>{
 if(!mesaActual) return alert("Seleccioná mesa");

 pedido.push({nombre:n,precio:p});
 total+=p;
 render();
}

// render pedido
function render(){
 let lista=document.getElementById("lista");
 lista.innerHTML="";
 pedido.forEach(i=>{
  let li=document.createElement("li");
  li.textContent=i.nombre+" - $"+i.precio;
  lista.appendChild(li);
 });
 document.getElementById("total").textContent=total;
}

// enviar pedido
window.enviar=async()=>{
 if(!mesaActual || pedido.length==0) return;

 await addDoc(collection(db,"pedidos"),{
  mesa:mesaActual,
  items:pedido,
  total,
  listo:false
 });

 let ref=doc(db,"mesas",""+mesaActual);
 let snap=await getDoc(ref);

 if(snap.exists()){
  await updateDoc(ref,{total:snap.data().total+total});
 }else{
  await setDoc(ref,{total});
 }

 pedido=[];total=0;
 render();
}

// cobrar/reset mesa
window.resetMesa=async()=>{
 if(!mesaActual) return;

 let ref=doc(db,"mesas",""+mesaActual);
 await setDoc(ref,{total:0});

 alert("Mesa cobrada");
}

// borrar mesas cobradas (total 0)
window.borrarMesas=async()=>{
 if(!confirm("¿Borrar mesas cobradas?")) return;

 const snap=await getDocs(collection(db,"mesas"));

 snap.forEach(async(d)=>{
  if(d.data().total===0){
   await deleteDoc(doc(db,"mesas",d.id));
  }
 });

 alert("Mesas limpiadas");
}

// ver totales en tiempo real
onSnapshot(collection(db,"mesas"),(snap)=>{
 let lista=document.getElementById("totales");
 lista.innerHTML="";
 snap.forEach(d=>{
  let li=document.createElement("li");
  li.textContent="Mesa "+d.id+" → $"+d.data().total;
  lista.appendChild(li);
 });
});
</script>
</head>

<body>

<h1>🍽️ Mozo</h1>

<!-- MESAS -->
<div class="grid">
<div class="mesa" id="m1" onclick="selectMesa(1)">Mesa 1</div>
<div class="mesa" id="m2" onclick="selectMesa(2)">Mesa 2</div>
<div class="mesa" id="m3" onclick="selectMesa(3)">Mesa 3</div>
<div class="mesa" id="m4" onclick="selectMesa(4)">Mesa 4</div>
<div class="mesa" id="m5" onclick="selectMesa(5)">Mesa 5</div>
</div>

<!-- MENÚ -->
<div class="card">
<h2>Entradas</h2>
<button onclick="addItem('Ensalada',1200)">🥗 Ensalada</button>
<button onclick="addItem('Sopa',1000)">🍲 Sopa</button>

<h2>Principales</h2>
<button onclick="addItem('Milanesa',2500)">🍗 Milanesa</button>
<button onclick="addItem('Hamburguesa',2000)">🍔 Hamburguesa</button>
<button onclick="addItem('Pizza',2200)">🍕 Pizza</button>

<h2>Postres</h2>
<button onclick="addItem('Helado',1200)">🍨 Helado</button>
<button onclick="addItem('Flan',1100)">🍮 Flan</button>

<h2>Bebidas</h2>
<button onclick="addItem('Gaseosa',800)">🥤 Gaseosa</button>
<button onclick="addItem('Agua',600)">💧 Agua</button>
<button onclick="addItem('Cerveza',1200)">🍺 Cerveza</button>
</div>

<!-- PEDIDO -->
<div class="card">
<h2>Pedido</h2>
<ul id="lista"></ul>
<p class="total">$<span id="total">0</span></p>

<button class="enviar" onclick="enviar()">Enviar a Cocina</button>
<button class="reset" onclick="resetMesa()">Cobrar / Reset Mesa</button>
<button class="reset" onclick="borrarMesas()">🧹 Borrar Mesas Cobradas</button>
</div>

<!-- TOTALES -->
<div class="card">
<h2>Totales</h2>
<ul id="totales"></ul>
</div>

</body>
</html>
