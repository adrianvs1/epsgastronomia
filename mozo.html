<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mozo POS Firebase</title>

<style>
body{
font-family:system-ui;
background:#0f172a;
color:white;
margin:0;
padding:10px;
}

h1{text-align:center}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-bottom:10px;
}

.mesa{
background:#1e293b;
padding:15px;
text-align:center;
border-radius:10px;
cursor:pointer;
}

.mesa.activa{background:#22c55e}

.card{
background:#1e293b;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

button{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:8px;
cursor:pointer;
}

.azul{background:#3b82f6;color:white}
.verde{background:#22c55e;color:white}
.naranja{background:#f59e0b;color:white}

#avisos div{
background:#22c55e;
padding:10px;
margin:5px 0;
border-radius:8px;
font-weight:bold;
}
</style>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
onSnapshot,
doc,
getDocs,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAa_bH-T5Uv36eM-dSjasTFzVWp9Iwj0Ps",
authDomain: "epsgastronomia-6d1b2.firebaseapp.com",
projectId: "epsgastronomia-6d1b2",
storageBucket: "epsgastronomia-6d1b2.firebasestorage.app",
messagingSenderId: "735621231992",
appId: "1:735621231992:web:ac62161644b7377095448d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let mesaActual = null;
let pedido = [];
let total = 0;

// 🪑 seleccionar mesa
window.selectMesa = (n) => {
mesaActual = n;
document.querySelectorAll(".mesa").forEach(m => m.classList.remove("activa"));
document.getElementById("m"+n).classList.add("activa");
};

// 🍔 agregar item
window.addItem = (n,p) => {
if(!mesaActual) return alert("Seleccioná mesa");

pedido.push({nombre:n,precio:p});
total += p;
render();
};

// ❌ borrar item
window.borrarItem = (i) => {
total -= pedido[i].precio;
pedido.splice(i,1);
render();
};

function render(){
let lista = document.getElementById("lista");
lista.innerHTML = "";

pedido.forEach((p,i)=>{
let li = document.createElement("li");
li.innerHTML = `
${p.nombre} - $${p.precio}
<button onclick="borrarItem(${i})" style="background:red;color:white;width:auto">X</button>
`;
lista.appendChild(li);
});

document.getElementById("total").textContent = total;
}

// 📤 ENVIAR A COCINA
window.enviar = async () => {
try{

if(!mesaActual || pedido.length === 0){
alert("Completa pedido");
return;
}

await addDoc(collection(db,"pedidos"),{
mesa: mesaActual,
items: pedido,
total: total,
estado: "pendiente",
listo: false
});

navigator.vibrate?.(200);

pedido = [];
total = 0;
render();

alert("Pedido enviado ✔");

}catch(e){
alert("Error Firebase: " + e.message);
}
};

// 💰 CAJA MESA
window.verCuenta = async () => {

let snap = await getDocs(collection(db,"pedidos"));
let totalMesa = 0;

snap.forEach(d=>{
let p = d.data();

if(p.mesa == mesaActual && p.estado == "entregado"){
totalMesa += p.total;
}
});

document.getElementById("caja").innerHTML = `
<p>Mesa ${mesaActual}</p>
<p style="font-size:22px"><b>$${totalMesa}</b></p>
<button id="btnCobrar" style="background:#f59e0b;color:white">
💰 COBRAR MESA
</button>
`;

document.getElementById("btnCobrar").onclick = async () => {

let snap = await getDocs(collection(db,"pedidos"));

snap.forEach(async(d)=>{
let p = d.data();

if(p.mesa == mesaActual){
await updateDoc(doc(db,"pedidos",d.id),{
estado:"cerrado"
});
}
});

alert("Mesa cobrada ✔");
document.getElementById("caja").innerHTML = "";
};
};

// 🔔 AVISOS DE COCINA
let estado = new Map();

onSnapshot(collection(db,"pedidos"),(snap)=>{

snap.forEach(d=>{
const data = d.data();
const id = d.id;
const prev = estado.get(id);

// cuando cocina marca listo
if(prev && prev.listo === false && data.listo === true){

navigator.vibrate?.([200,100,200]);

let aviso = document.createElement("div");
aviso.innerHTML = `
🍽️ Mesa ${data.mesa} LISTA
<button style="background:red;color:white;width:100%">
ENTREGADO
</button>
`;

aviso.querySelector("button").onclick = async () => {

await updateDoc(doc(db,"pedidos",id),{
estado:"entregado"
});

aviso.remove();
verCuenta();
};

document.getElementById("avisos").appendChild(aviso);
}

estado.set(id,data);
});

});

</script>

</head>

<body>

<h1>🍽️ Mozo POS Firebase</h1>

<div class="card">
<h2>💰 Caja</h2>
<div id="caja"></div>
</div>

<div id="avisos"></div>

<div class="grid">
<div class="mesa" id="m1" onclick="selectMesa(1)">Mesa 1</div>
<div class="mesa" id="m2" onclick="selectMesa(2)">Mesa 2</div>
<div class="mesa" id="m3" onclick="selectMesa(3)">Mesa 3</div>
<div class="mesa" id="m4" onclick="selectMesa(4)">Mesa 4</div>
<div class="mesa" id="m5" onclick="selectMesa(5)">Mesa 5</div>
</div>

<div class="card">
<button class="azul" onclick="addItem('Hamburguesa',2000)">Hamburguesa</button>
<button class="azul" onclick="addItem('Pizza',2200)">Pizza</button>
<button class="azul" onclick="addItem('Gaseosa',800)">Gaseosa</button>
</div>

<div class="card">
<ul id="lista"></ul>
<p>Total: $<span id="total">0</span></p>

<button class="verde" onclick="enviar()">Enviar a Cocina</button>
<button class="naranja" onclick="verCuenta()">Ver cuenta</button>
</div>

</body>
</html>
