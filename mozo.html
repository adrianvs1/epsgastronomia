<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sabores en Codigo EPS</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Poppins',sans-serif;
background:#0f172a;
color:white;
margin:0;
padding:10px;
}

h1{text-align:center}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.mesa{
background:#1e293b;
padding:15px;
border-radius:10px;
text-align:center;
cursor:pointer;
transition:0.2s;
}

.mesa:active{transform:scale(0.97)}

.mesa.activa{
background:#22c55e;
box-shadow:0 0 10px rgba(34,197,94,0.4);
}

.card{
background:#1e293b;
padding:10px;
border-radius:10px;
margin:10px 0;
}

.azul{
background:#3b82f6;
color:white;
transition:0.2s;
}

.azul.seleccionado{
background:#22c55e !important;
box-shadow:0 0 12px rgba(34,197,94,0.7);
}

button{
width:100%;
padding:10px;
border:none;
border-radius:8px;
margin-top:5px;
cursor:pointer;
font-family:'Poppins',sans-serif;
}

.verde{background:#22c55e;color:white}
.amarillo{background:#facc15;color:black;font-weight:600}

ul{padding-left:18px;margin:0}

/* MODAL */
#modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.7);
z-index:9999;
}

#modalBox{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
background:#111827;
width:90%;
max-width:350px;
padding:20px;
border-radius:12px;
text-align:center;
}
</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
onSnapshot,
updateDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAa_bH-T5Uv36eM-dSjasTFzVWp9Iwj0Ps",
authDomain: "epsgastronomia-6d1b2.firebaseapp.com",
projectId: "epsgastronomia-6d1b2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let mesa=null;
let pedido=[];
let total=0;

//////////////////////////////////////////////////////
// MESAS
//////////////////////////////////////////////////////

window.sel=(m)=>{
mesa=m;
document.querySelectorAll(".mesa").forEach(x=>x.classList.remove("activa"));
document.getElementById("m"+m).classList.add("activa");
};

//////////////////////////////////////////////////////
// PRODUCTOS
//////////////////////////////////////////////////////

window.addItem=(n,p)=>{

if(!mesa){
alert("Seleccioná mesa");
return;
}

pedido.push({n,p});
total+=p;
render();
};

window.marcar=(btn)=>{
document.querySelectorAll(".azul").forEach(b=>{
if(b!==btn) b.classList.remove("seleccionado");
});
btn.classList.add("seleccionado");
};

window.del=(i)=>{
total-=pedido[i].p;
pedido.splice(i,1);
render();
};

function render(){
let l=document.getElementById("lista");
l.innerHTML="";

pedido.forEach((x,i)=>{
l.innerHTML+=`
<li>${x.n} - $${x.p}
<button onclick="del(${i})" style="background:red;color:white;width:auto">X</button>
</li>`;
});

document.getElementById("t").innerText=total;
}

//////////////////////////////////////////////////////
// ENVIAR
//////////////////////////////////////////////////////

window.enviar=async()=>{

if(!mesa || pedido.length===0){
alert("Seleccioná mesa y productos");
return;
}

const fechaHora=new Date().toLocaleString();

await addDoc(collection(db,"pedidos"),{
mesa,
items:pedido,
total,
estado:"cocina",
fecha:fechaHora
});

document.getElementById("modal").innerHTML=`
<div id="modalBox">
<h2>✔ Pedido enviado</h2>
<p>Mesa ${mesa}</p>
<p>${fechaHora}</p>

<ul>
${pedido.map(p=>`<li>${p.n}</li>`).join("")}
</ul>

<h3>Total: $${total}</h3>

<button onclick="closeModal()">OK</button>
</div>
`;

document.getElementById("modal").style.display="block";

pedido=[];
total=0;
render();
};

window.closeModal=()=>{
document.getElementById("modal").style.display="none";
};

//////////////////////////////////////////////////////
// COCINA
//////////////////////////////////////////////////////

onSnapshot(collection(db,"pedidos"),snap=>{

let cont=document.getElementById("avisos");
cont.innerHTML="";

snap.forEach(d=>{
let p=d.data();

if(p.estado==="entregado"){

let div=document.createElement("div");

div.innerHTML=`
🍽️ Mesa ${p.mesa}
<br><small>${p.fecha}</small>

<ul>
${p.items.map(i=>`<li>${i.n}</li>`).join("")}
</ul>

<button class="amarillo">✔ ENTREGAR</button>
`;

div.querySelector("button").onclick=async()=>{
await updateDoc(doc(db,"pedidos",d.id),{
estado:"listo"
});
};

cont.appendChild(div);
}

});

});

//////////////////////////////////////////////////////
// CAJA (CON PRECIO)
//////////////////////////////////////////////////////

onSnapshot(collection(db,"pedidos"),snap=>{

let caja=document.getElementById("caja");
caja.innerHTML="";

let mesas={};

snap.forEach(d=>{
let p=d.data();

if(p.estado==="listo"){

if(!mesas[p.mesa]){
mesas[p.mesa]={
total:0,
items:[],
fecha:p.fecha
};
}

mesas[p.mesa].total+=p.total;
mesas[p.mesa].items.push(...p.items);
}

});

Object.keys(mesas).forEach(m=>{

let d=mesas[m];

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<h3>💰 Mesa ${m}</h3>

<small>${d.fecha}</small>

<ul>
${d.items.map(i=>`<li>${i.n} - $${i.p}</li>`).join("")}
</ul>

<h2>Total: $${d.total}</h2>

<button class="amarillo">💰 COBRAR</button>
`;

div.querySelector("button").onclick=async()=>{

snap.forEach(async x=>{
let p=x.data();
if(p.mesa==m && p.estado==="listo"){
await updateDoc(doc(db,"pedidos",x.id),{
estado:"cerrado"
});
}
});

};

caja.appendChild(div);
});

});

</script>

</head>

<body>

<h1>🍽️ EPS - SABORES EN CÓDIGO</h1>

<div class="grid">
<div class="mesa" id="m1" onclick="sel(1)">Mesa 1</div>
<div class="mesa" id="m2" onclick="sel(2)">Mesa 2</div>
<div class="mesa" id="m3" onclick="sel(3)">Mesa 3</div>
</div>

<div class="card">
<h2>🍔 Comidas</h2>

<button class="azul" onclick="marcar(this);addItem('Pizza',18000)">Pizza $18000</button>
<button class="azul" onclick="marcar(this);addItem('Hamburguesa',15000)">Hamburguesa $15000</button>
<button class="azul" onclick="marcar(this);addItem('Milanesa',18000)">Milanesa $18000</button>
<button class="azul" onclick="marcar(this);addItem('Pasta',16000)">Pasta $16000</button>
<button class="azul" onclick="marcar(this);addItem('Empanadas',1200)">Empanadas $1200</button>
</div>

<div class="card">
<h2>🥤 Bebidas</h2>

<button class="azul" onclick="marcar(this);addItem('Gaseosa',8000)">Gaseosa $8000</button>
<button class="azul" onclick="marcar(this);addItem('Agua',6000)">Agua $6000</button>
<button class="azul" onclick="marcar(this);addItem('Cerveza',12000)">Cerveza $12000</button>
<button class="azul" onclick="marcar(this);addItem('Vino',8000)">Vino $8000</button>
</div>

<div class="card">
<h2>🧾 Pedido</h2>

<ul id="lista"></ul>
<h3>Total: $<span id="t">0</span></h3>

<button class="verde" onclick="enviar()">Enviar a Cocina</button>
</div>

<div class="card">
<h2>🔔 Cocina</h2>
<div id="avisos"></div>
</div>

<div class="card">
<h2>💰 Caja</h2>
<div id="caja"></div>
</div>

<div id="modal"></div>

</body>
</html>
